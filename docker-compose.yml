version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: guidemate
      POSTGRES_USER: guidemate
      POSTGRES_PASSWORD: guidemate
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/guidemate
      DB_USER: guidemate
      DB_PASSWORD: guidemate
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: "change_me_to_real_secret_with_at_least_256_bits_123456789"
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
